# -- general -------------------------------------------------------------------

# See [tmux.md](.config/kevmoo-fyi/tmux.md) for a cheat sheet

set -g default-shell /usr/bin/zsh
set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm*:Tc"

# Ensure UTF-8 is supported
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM"
setenv -g LANG en_US.UTF-8
setenv -g LC_ALL en_US.UTF-8

set -g history-limit 5000                 # boost history

# edit configuration
bind e new-window -n "~/.config/tmux/tmux.conf" "sh -c '\${EDITOR:-vim} ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf && tmux display \"~/.config/tmux/tmux.conf sourced\"'"

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display "~/.config/tmux/tmux.conf sourced"

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# activity
set -g monitor-activity on
set -g visual-activity off

# -- navigation ----------------------------------------------------------------

# split current window horizontally
bind - split-window -v
# split current window vertically
bind | split-window -h

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
bind -r p previous-window
bind -r n next-window
bind Tab last-window        # move to last active window

# -- mouse ---------------------------------------------------------------------

set -g mouse off

# -- style ---------------------------------------------------------------------

# Status bar
set -g status-style "bg=black,fg=white"

# Left side
set -g status-left-length 40
set -g status-left "#[fg=blue,bold] 📦 #S #[fg=white,nobold] "

# Right side
set -g status-right-length 150
set -g status-right "#[fg=red] 📅 %Y-%m-%d #[fg=white]• #[fg=green,bold] 🕒 %H:%M #[fg=white]• #[fg=cyan,bold] 💻 #H "

# Window status
set -g window-status-separator " "
set -g window-status-format "#[fg=white,bg=black] #I:#W "
set -g window-status-current-format "#[fg=black,bg=yellow,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"

# Message style
set -g message-style "bg=yellow,fg=black,bold"
